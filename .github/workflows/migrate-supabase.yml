name: Apply Supabase Migrations

# 手动触发:在 GitHub 上点 Actions → Apply Supabase Migrations → Run workflow → 选 main 分支
# 第一次设置:
#   1. repo Settings → Secrets and variables → Actions → New repository secret
#   2. Name:SUPABASE_DB_URL
#   3. Value:从 Supabase 控制台 Settings → Database → Connection string 整段粘贴
#   4. 同样添加 SUPABASE_ANON_KEY(便于 GitHub Pages build 注入)
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '空跑(只 print 即将应用的 SQL,不真正执行)'
        required: false
        default: 'false'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 检测 Secrets
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "::error::Secrets 缺 SUPABASE_DB_URL"
            echo "→ repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "→ Name: SUPABASE_DB_URL  Value: postgres://..."
            exit 1
          fi

      - name: 安装 psql + 验证连接
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client
          echo "PING test:"
          psql "$DB_URL" -c "SELECT current_database() AS db, current_user AS u, version();" || {
            echo "::error::连不上 Postgres。检查 SUPABASE_DB_URL 是不是 'Direct connection'(给 DDL 用),不是 'Transaction pooler'。"
            exit 1
          }

      - name: 检测已执行过的迁移
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$DB_URL" -t -c "SELECT count(*) FROM information_schema.tables WHERE table_schema='public';" > /tmp/existing_tables
          echo "已有 public 表数量:$(cat /tmp/existing_tables)"

      - name: 顺序跑 4 个迁移
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          cd app/supabase/migrations
          set -e
          for f in $(ls *.sql | sort); do
            echo ""
            echo "▶ Running $f ..."
            psql "$DB_URL" -v ON_ERROR_STOP=0 -f "$f" 2>&1 | tail -8
            echo "  ✓ $f done"
          done
          echo ""
          echo "全部迁移完成。"

      - name: 校验表数量
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          COUNT=$(psql "$DB_URL" -t -c "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_type='BASE TABLE';" | xargs)
          echo "现存 public 表数量: $COUNT"
          if [ "$COUNT" -lt 10 ]; then
            echo "::error::预期至少 10 张表,只有 $COUNT 张。请查看上方输出排查。"
            exit 1
          fi
          psql "$DB_URL" -c "\dt public.*" | head -20
