name: Apply Supabase Migrations

  on:
    workflow_dispatch:
      inputs:
        db_url:
          description: 'Supabase DB 连接串(postgresql://...)'
          required: true
          type: string

  jobs:
    migrate:
      runs-on: ubuntu-latest
      steps:
        - name: 安装 psql
          run: |
            sudo apt-get update -qq
            sudo apt-get install -y -qq postgresql-client
        - name: 检测输入
          run: |
            if [ -z "${{ inputs.db_url }}" ]; then
              echo "::error::必须填入 db_url"
              exit 1
            fi
            echo "DB_URL 长度: ${#DB_URL}"
        - name: 测试连接
          env:
            DB_URL: ${{ inputs.db_url }}
          run: |
            echo "$DB_URL" | head -c 30
            psql "$DB_URL" -c "SELECT current_database(), current_user;" || {
              echo "::error::psql 连接失败,看看上面 log 的 host/端口"
              exit 1
            }
        - name: 跑 4 个迁移
          env:
            DB_URL: ${{ inputs.db_url }}
          run: |
            cd app/supabase/migrations
            for f in $(ls *.sql | sort); do
              echo "▶$f"
              psql "$DB_URL" -v ON_ERROR_STOP=0 -f "$f" 2>&1 | tail -8
            done
        - name: 校验表数量
          env:
            DB_URL: ${{ inputs.db_url }}
          run: |
            COUNT=$(psql "$DB_URL" -t -c "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND
  table_type='BASE TABLE';" | xargs)
            echo "现存 public 表数量: $COUNT"
            [ "$COUNT" -ge 10 ] || (echo "::error::表数量不足" && exit 1)
